version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: tpci-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=http://localhost:3001
    container_name: tpci-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy