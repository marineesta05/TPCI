name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/tpci-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/tpci-frontend

jobs:
  # ── 1. Tests ────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances backend
        working-directory: backend
        run: npm ci

      - name: Lancer les tests
        working-directory: backend
        run: npm test

  # ── 2. Build & Push Docker ──────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write 
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest,${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest,${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          build-args: |
            REACT_APP_BACKEND_URL=http://${{ secrets.VM_HOST }}:3001

  # ── 3. Déploiement sur VM ───────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Connexion au registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Mise à jour des images Kubernetes
            kubectl set image deployment/backend \
              backend=${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            kubectl set image deployment/frontend \
              frontend=${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

            # Vérification
            kubectl rollout status deployment/backend
            kubectl rollout status deployment/frontend